<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuralPlayer – Twoja muzyka</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0b0b0e;
            color: #e4e4f0;
            padding: 20px;
            min-height: 100vh;
        }

        .app {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ---------- NAGŁÓWEK ---------- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid #2a2a36;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-area img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #2a2a36;
            padding: 4px;
        }
        .logo-area h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .nav-links a {
            color: #b0b0c8;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: #c4b5fd;
        }
        .nav-links .profile-link {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-links .profile-link img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #3a3a4a;
        }
        .btn-logout {
            background: #2a2a36;
            border: none;
            color: #f87171;
            padding: 8px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-logout:hover {
            background: #3a3a4a;
        }

        /* ---------- WYSZUKIWARKA ---------- */
        .search-section {
            margin: 24px 0;
        }
        .search-bar {
            display: flex;
            gap: 12px;
            background: #17171f;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #2a2a36;
            max-width: 600px;
        }
        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 16px;
            padding: 12px 0;
            outline: none;
        }
        .search-bar input::placeholder {
            color: #5a5a72;
        }
        .search-bar button {
            background: #7c3aed;
            border: none;
            border-radius: 30px;
            padding: 8px 24px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-bar button:hover {
            background: #6d28d9;
        }

        /* ---------- TUTORIAL ---------- */
        .tutorial {
            background: #17171f;
            border: 1px solid #2a2a36;
            border-radius: 20px;
            padding: 24px 28px;
            margin: 24px 0;
        }
        .tutorial h2 {
            font-size: 20px;
            margin-bottom: 12px;
            color: #a78bfa;
        }
        .tutorial ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .tutorial li {
            background: #22222e;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
        }
        .tutorial li span {
            margin-right: 8px;
        }

        /* ---------- PLAYLISTY ---------- */
        .playlists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 18px;
            margin: 20px 0 30px;
        }
        .playlist-card {
            background: #17171f;
            border: 1px solid #2a2a36;
            border-radius: 16px;
            padding: 18px;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }
        .playlist-card:hover {
            transform: translateY(-4px);
            border-color: #7c3aed;
        }
        .playlist-card h3 {
            font-size: 16px;
            margin-bottom: 6px;
        }
        .playlist-card p {
            font-size: 13px;
            color: #8888a0;
        }

        /* ---------- WYNIKI WYSZUKIWANIA ---------- */
        .results-list {
            margin: 20px 0;
        }
        .song-item {
            background: #17171f;
            border: 1px solid #2a2a36;
            border-radius: 12px;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .song-item .info {
            display: flex;
            flex-direction: column;
        }
        .song-item .title {
            font-weight: 600;
        }
        .song-item .album {
            font-size: 13px;
            color: #8888a0;
        }
        .song-item .actions button {
            background: #2a2a36;
            border: none;
            color: #b0b0c8;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
            margin-left: 6px;
        }
        .song-item .actions button:hover {
            background: #3a3a4a;
            color: #fff;
        }
        .song-item .actions .add-playlist {
            background: #7c3aed;
            color: #fff;
        }
        .song-item .actions .add-playlist:hover {
            background: #6d28d9;
        }

        /* ---------- MODAL (dodaj do playlisty) ---------- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #17171f;
            border: 1px solid #2a2a36;
            border-radius: 24px;
            padding: 32px;
            max-width: 420px;
            width: 90%;
        }
        .modal h2 {
            margin-bottom: 16px;
            color: #a78bfa;
        }
        .modal select {
            width: 100%;
            padding: 12px;
            background: #22222e;
            border: 1px solid #3a3a4a;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            margin-bottom: 16px;
            outline: none;
        }
        .modal .btn-row {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .modal .btn-row button {
            padding: 10px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .modal .btn-row .btn-cancel {
            background: #2a2a36;
            color: #b0b0c8;
        }
        .modal .btn-row .btn-cancel:hover {
            background: #3a3a4a;
        }
        .modal .btn-row .btn-confirm {
            background: #7c3aed;
            color: #fff;
        }
        .modal .btn-row .btn-confirm:hover {
            background: #6d28d9;
        }

        /* ---------- OGÓLNE ---------- */
        .section-title {
            font-size: 20px;
            margin: 24px 0 12px;
            color: #c4b5fd;
        }
        .empty {
            color: #5a5a72;
            font-style: italic;
        }
        .hidden {
            display: none;
        }

        /* responsywność */
        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: space-between;
            }
            .search-bar {
                max-width: 100%;
            }
            .playlists-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <!-- Nagłówek -->
        <header class="header">
            <div class="logo-area">
                <img src="logo.png" alt="AuralPlayer" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2248%22 height=%2248%22 viewBox=%220 0 48 48%22%3E%3Crect width=%2248%22 height=%2248%22 fill=%227c3aed%22/%3E%3Ctext x=%2224%22 y=%2232%22 font-size=%2224%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22 font-weight=%22bold%22%3E♫%3C/text%3E%3C/svg%3E'" />
                <h1>AuralPlayer</h1>
            </div>
            <div class="nav-links">
                <a href="#" id="navHome">Strona główna</a>
                <a href="profile.html" class="profile-link" id="navProfile">
                    <img id="headerAvatar" src="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2232%22 height=%2232%22 viewBox=%220 0 32 32%22%3E%3Crect width=%2232%22 height=%2232%22 fill=%222a2a36%22/%3E%3Ctext x=%2216%22 y=%2222%22 font-size=%2216%22 text-anchor=%22middle%22 fill=%225a5a72%22%3E👤%3C/text%3E%3C/svg%3E" alt="avatar" />
                    <span id="headerUsername">Profil</span>
                </a>
                <button class="btn-logout" id="logoutBtn">Wyloguj</button>
            </div>
        </header>

        <!-- Wyszukiwarka -->
        <section class="search-section">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Szukaj utworów po tytule lub albumie..." />
                <button id="searchBtn">Szukaj</button>
            </div>
        </section>

        <!-- Tutorial (widoczny tylko dla nowych użytkowników) -->
        <div class="tutorial" id="tutorialBox">
            <h2>🎵 Witaj w AuralPlayer!</h2>
            <p style="margin-bottom: 12px; color: #b0b0c8;">Oto jak zacząć:</p>
            <ul>
                <li><span>📂</span> Utwórz swoją pierwszą playlistę</li>
                <li><span>🔍</span> Wyszukaj ulubione utwory</li>
                <li><span>➕</span> Dodaj je do playlisty</li>
                <li><span>👤</span> W profilu dodawaj własne utwory</li>
            </ul>
        </div>

        <!-- Playlisty użytkownika -->
        <h2 class="section-title">📀 Twoje playlisty</h2>
        <div class="playlists-grid" id="playlistsContainer">
            <!-- tu będą karty playlist -->
        </div>

        <!-- Wyniki wyszukiwania -->
        <div id="searchResultsContainer" class="hidden">
            <h2 class="section-title">🔎 Wyniki wyszukiwania</h2>
            <div id="searchResults" class="results-list"></div>
        </div>

        <!-- Modal: dodaj do playlisty -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <h2>Dodaj do playlisty</h2>
                <p style="color:#b0b0c8; margin-bottom: 12px;" id="modalSongTitle">Utwór: ...</p>
                <select id="modalPlaylistSelect">
                    <option value="">-- wybierz playlistę --</option>
                </select>
                <div class="btn-row">
                    <button class="btn-cancel" id="modalCancel">Anuluj</button>
                    <button class="btn-confirm" id="modalConfirm">Dodaj</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        //  SUPABASE
        // ================================================================
        const SUPABASE_URL = 'https://ddwvoeydcsldwemsxyyh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable__LpwBQfFUsyqu_xLXmcSuQ__CC891VC';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ================================================================
        //  REFERENCJE
        // ================================================================
        const headerAvatar = document.getElementById('headerAvatar');
        const headerUsername = document.getElementById('headerUsername');
        const logoutBtn = document.getElementById('logoutBtn');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const searchResultsContainer = document.getElementById('searchResultsContainer');
        const searchResults = document.getElementById('searchResults');
        const playlistsContainer = document.getElementById('playlistsContainer');
        const tutorialBox = document.getElementById('tutorialBox');

        const modalOverlay = document.getElementById('modalOverlay');
        const modalSongTitle = document.getElementById('modalSongTitle');
        const modalPlaylistSelect = document.getElementById('modalPlaylistSelect');
        const modalCancel = document.getElementById('modalCancel');
        const modalConfirm = document.getElementById('modalConfirm');

        let currentUserId = null;
        let currentSongId = null;

        // ================================================================
        //  POMOCNICZE
        // ================================================================
        function showMessage(msg) {
            alert(msg);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ================================================================
        //  SPRAWDZANIE SESJI
        // ================================================================
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return null;
            }
            currentUserId = session.user.id;
            const { data: profile, error } = await supabase
                .from('profiles')
                .select('username, avatar_url')
                .eq('id', currentUserId)
                .maybeSingle();
            if (profile) {
                headerUsername.textContent = profile.username || 'Użytkownik';
                if (profile.avatar_url) {
                    headerAvatar.src = profile.avatar_url;
                }
            }
            return session;
        }

        // ================================================================
        //  WYSZUKIWANIE
        // ================================================================
        async function searchSongs(query) {
            if (!query.trim()) {
                searchResultsContainer.classList.add('hidden');
                return;
            }
            const { data, error } = await supabase
                .from('songs')
                .select('*, profiles(username)')
                .eq('is_public', true)
                .or(`title.ilike.%${query}%,album.ilike.%${query}%`)
                .order('created_at', { ascending: false })
                .limit(30);

            if (error) {
                console.error(error);
                return;
            }
            renderSearchResults(data);
        }

        function renderSearchResults(songs) {
            searchResultsContainer.classList.remove('hidden');
            if (!songs || songs.length === 0) {
                searchResults.innerHTML = '<p class="empty">Brak wyników.</p>';
                return;
            }
            let html = '';
            songs.forEach(song => {
                const owner = song.profiles?.username || 'anonim';
                html += `
                    <div class="song-item" data-songid="${song.id}">
                        <div class="info">
                            <span class="title">${escapeHtml(song.title)}</span>
                            <span class="album">${escapeHtml(song.album || 'Brak albumu')} • ${escapeHtml(owner)}</span>
                        </div>
                        <div class="actions">
                            <button class="add-playlist" data-songid="${song.id}">➕ Dodaj do playlisty</button>
                        </div>
                    </div>
                `;
            });
            searchResults.innerHTML = html;

            document.querySelectorAll('.add-playlist').forEach(btn => {
                btn.addEventListener('click', () => {
                    const songId = btn.dataset.songid;
                    openModal(songId);
                });
            });
        }

        // ================================================================
        //  PLAYLISTY
        // ================================================================
        async function loadPlaylists() {
            const { data, error } = await supabase
                .from('playlists')
                .select('*')
                .eq('user_id', currentUserId)
                .order('created_at', { ascending: false });

            if (error) {
                console.error(error);
                return;
            }
            renderPlaylists(data);
            if (!data || data.length === 0) {
                tutorialBox.style.display = 'block';
            } else {
                tutorialBox.style.display = 'none';
            }
        }

        function renderPlaylists(playlists) {
            if (!playlists || playlists.length === 0) {
                playlistsContainer.innerHTML = `<p class="empty">Nie masz jeszcze playlist. Utwórz pierwszą w profilu.</p>`;
                return;
            }
            let html = '';
            playlists.forEach(pl => {
                html += `
                    <div class="playlist-card" data-playlistid="${pl.id}">
                        <h3>${escapeHtml(pl.name)}</h3>
                        <p>${pl.created_at ? new Date(pl.created_at).toLocaleDateString() : ''}</p>
                    </div>
                `;
            });
            playlistsContainer.innerHTML = html;
        }

        // ================================================================
        //  MODAL – DODAJ DO PLAYLISTY
        // ================================================================
        async function openModal(songId) {
            const { data, error } = await supabase
                .from('songs')
                .select('title')
                .eq('id', songId)
                .maybeSingle();
            if (error || !data) {
                showMessage('Nie znaleziono utworu.');
                return;
            }
            currentSongId = songId;
            modalSongTitle.textContent = `Utwór: ${data.title}`;

            const { data: playlists, error: plError } = await supabase
                .from('playlists')
                .select('id, name')
                .eq('user_id', currentUserId);

            if (plError || !playlists || playlists.length === 0) {
                showMessage('Nie masz żadnej playlisty. Utwórz ją w profilu.');
                return;
            }
            modalPlaylistSelect.innerHTML = '<option value="">-- wybierz playlistę --</option>';
            playlists.forEach(pl => {
                const opt = document.createElement('option');
                opt.value = pl.id;
                opt.textContent = pl.name;
                modalPlaylistSelect.appendChild(opt);
            });
            modalOverlay.classList.add('active');
        }

        modalCancel.addEventListener('click', () => {
            modalOverlay.classList.remove('active');
        });

        modalConfirm.addEventListener('click', async () => {
            const playlistId = modalPlaylistSelect.value;
            if (!playlistId) {
                showMessage('Wybierz playlistę.');
                return;
            }
            const { data: existing, error: checkErr } = await supabase
                .from('playlist_songs')
                .select('*')
                .eq('playlist_id', playlistId)
                .eq('song_id', currentSongId)
                .maybeSingle();

            if (existing) {
                showMessage('Ten utwór jest już w tej playliście.');
                modalOverlay.classList.remove('active');
                return;
            }

            const { error } = await supabase
                .from('playlist_songs')
                .insert({ playlist_id: playlistId, song_id: currentSongId });

            if (error) {
                showMessage('Błąd: ' + error.message);
            } else {
                showMessage('✅ Dodano do playlisty!');
                modalOverlay.classList.remove('active');
            }
        });

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) modalOverlay.classList.remove('active');
        });

        // ================================================================
        //  WYLOGOWANIE
        // ================================================================
        logoutBtn.addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = 'login.html';
        });

        // ================================================================
        //  EVENTY
        // ================================================================
        searchBtn.addEventListener('click', () => {
            searchSongs(searchInput.value);
        });
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchSongs(searchInput.value);
        });

        // ================================================================
        //  START
        // ================================================================
        (async function init() {
            const session = await checkSession();
            if (!session) return;
            await loadPlaylists();
        })();
    </script>
</body>
</html>
