<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuralPlayer - Logowanie</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        /* ---------- RESET & BASE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0b0b0e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ---------- KONTEJNER ---------- */
        .auth-container {
            background: #17171f;
            border-radius: 32px;
            padding: 40px 36px;
            max-width: 460px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid #2a2a36;
            transition: all 0.3s ease;
        }

        /* ---------- LOGO ---------- */
        .logo-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 28px;
        }
        .logo-wrap img {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            object-fit: cover;
            background: #2a2a36;
            padding: 4px;
        }
        .logo-wrap h1 {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ---------- TABY ---------- */
        .tabs {
            display: flex;
            gap: 6px;
            background: #22222e;
            border-radius: 16px;
            padding: 4px;
            margin-bottom: 28px;
        }
        .tabs button {
            flex: 1;
            padding: 12px 0;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            background: transparent;
            color: #8888a0;
        }
        .tabs button.active {
            background: #7c3aed;
            color: #fff;
            box-shadow: 0 4px 16px rgba(124, 58, 237, 0.35);
        }
        .tabs button:hover:not(.active) {
            color: #ccc;
        }

        /* ---------- FORMY ---------- */
        .form-panel {
            display: none;
            animation: fadeUp 0.35s ease;
        }
        .form-panel.active {
            display: block;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #b0b0c8;
            margin-bottom: 5px;
            letter-spacing: 0.3px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: #22222e;
            border: 1.5px solid #333340;
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            transition: border 0.25s ease, box-shadow 0.25s ease;
            outline: none;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.15);
        }
        .form-group input::placeholder {
            color: #5a5a72;
        }

        .form-row {
            display: flex;
            gap: 12px;
        }
        .form-row .form-group {
            flex: 1;
        }

        /* ---------- PRZYCISKI ---------- */
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: #7c3aed;
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 6px;
            letter-spacing: 0.3px;
        }
        .btn-primary:hover {
            background: #6d28d9;
            transform: scale(1.01);
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.35);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-secondary {
            background: transparent;
            border: none;
            color: #8888a0;
            font-size: 14px;
            cursor: pointer;
            padding: 8px 4px;
            transition: color 0.2s ease;
            font-weight: 500;
        }
        .btn-secondary:hover {
            color: #b0b0c8;
        }
        .btn-link {
            background: none;
            border: none;
            color: #a78bfa;
            font-size: 14px;
            cursor: pointer;
            padding: 6px 0;
            font-weight: 500;
            transition: color 0.2s ease;
            text-decoration: underline;
            text-underline-offset: 2px;
            text-decoration-thickness: 1.5px;
            text-decoration-color: rgba(167, 139, 250, 0.3);
        }
        .btn-link:hover {
            color: #c4b5fd;
        }

        .forgot-wrap {
            display: flex;
            justify-content: flex-end;
            margin-top: 2px;
        }

        /* ---------- KOMUNIKATY ---------- */
        .message {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 16px;
            display: none;
        }
        .message.error {
            display: block;
            background: rgba(239, 68, 68, 0.12);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .message.success {
            display: block;
            background: rgba(52, 211, 153, 0.10);
            color: #6ee7b7;
            border: 1px solid rgba(52, 211, 153, 0.15);
        }
        .message.info {
            display: block;
            background: rgba(96, 165, 250, 0.08);
            color: #93bbfc;
            border: 1px solid rgba(96, 165, 250, 0.12);
        }

        /* ---------- AVATAR UPLOAD ---------- */
        .avatar-upload {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-top: 4px;
        }
        .avatar-preview {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            background: #2a2a36;
            border: 2px solid #3a3a4a;
            flex-shrink: 0;
        }
        .avatar-upload input[type="file"] {
            display: none;
        }
        .avatar-upload .upload-btn {
            padding: 10px 20px;
            background: #2a2a36;
            border: 1.5px dashed #4a4a5e;
            border-radius: 12px;
            color: #b0b0c8;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .avatar-upload .upload-btn:hover {
            background: #333340;
            border-color: #7c3aed;
            color: #fff;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 500px) {
            .auth-container {
                padding: 28px 20px;
            }
            .logo-wrap h1 {
                font-size: 22px;
            }
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            .tabs button {
                font-size: 13px;
                padding: 10px 0;
            }
        }

        /* ---------- SKROLL ---------- */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #17171f;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3a4e;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #5a5a72;
        }

        /* loading spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .btn-primary.loading {
            pointer-events: none;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="auth-container">

        <!-- LOGO -->
        <div class="logo-wrap">
            <img src="logo.png" alt="AuralPlayer" id="logoImg" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2264%22 height=%2264%22 viewBox=%220 0 64 64%22%3E%3Crect width=%2264%22 height=%2264%22 fill=%227c3aed%22/%3E%3Ctext x=%2232%22 y=%2242%22 font-size=%2232%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22 font-weight=%22bold%22%3E♫%3C/text%3E%3C/svg%3E'" />
            <h1>AuralPlayer</h1>
        </div>

        <!-- TABY -->
        <div class="tabs" id="tabContainer">
            <button class="active" data-tab="login">Zaloguj</button>
            <button data-tab="register">Rejestracja</button>
        </div>

        <!-- KOMUNIKATY -->
        <div id="messageBox" class="message"></div>

        <!-- ======== PANEL LOGOWANIA ======== -->
        <div id="panelLogin" class="form-panel active">
            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label>Email lub nazwa użytkownika</label>
                    <input type="text" id="loginIdentifier" placeholder="np. jan.kowalski@email.com lub janek" required />
                </div>
                <div class="form-group">
                    <label>Hasło</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required />
                </div>
                <div class="forgot-wrap">
                    <button type="button" class="btn-link" id="forgotBtn">Zapomniałeś hasła?</button>
                </div>
                <button type="submit" class="btn-primary" id="loginBtn">Zaloguj się</button>
            </form>
        </div>

        <!-- ======== PANEL REJESTRACJI ======== -->
        <div id="panelRegister" class="form-panel">
            <form id="registerForm" autocomplete="off">
                <div class="form-group">
                    <label>Nazwa użytkownika</label>
                    <input type="text" id="regUsername" placeholder="np. janek_music" required />
                </div>
                <div class="form-group">
                    <label>Adres e-mail</label>
                    <input type="email" id="regEmail" placeholder="jan@example.com" required />
                </div>
                <div class="form-group">
                    <label>Potwierdź e-mail</label>
                    <input type="email" id="regEmailConfirm" placeholder="jan@example.com" required />
                </div>
                <div class="form-group">
                    <label>Hasło (min. 6 znaków)</label>
                    <input type="password" id="regPassword" placeholder="••••••••" minlength="6" required />
                </div>

                <!-- AVATAR -->
                <div class="form-group">
                    <label>Awatar (opcjonalnie)</label>
                    <div class="avatar-upload">
                        <img class="avatar-preview" id="avatarPreview" src="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2264%22 height=%2264%22 viewBox=%220 0 64 64%22%3E%3Crect width=%2264%22 height=%2264%22 fill=%222a2a36%22/%3E%3Ctext x=%2232%22 y=%2242%22 font-size=%2232%22 text-anchor=%22middle%22 fill=%225a5a72%22 font-family=%22sans-serif%22%3E👤%3C/text%3E%3C/svg%3E" alt="avatar" />
                        <label class="upload-btn" for="avatarInput">📁 Wybierz obraz</label>
                        <input type="file" id="avatarInput" accept="image/png,image/jpeg,image/gif,image/webp" />
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="registerBtn">Załóż konto</button>
            </form>
        </div>

    </div>

    <script>
        // ================================================================
        //  SUPABASE KONFIGURACJA
        // ================================================================
        const SUPABASE_URL = 'https://ddwvoeydcsldwemsxyyh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable__LpwBQfFUsyqu_xLXmcSuQ__CC891VC';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ================================================================
        //  REFERENCJE
        // ================================================================
        const tabBtns = document.querySelectorAll('.tabs button');
        const panelLogin = document.getElementById('panelLogin');
        const panelRegister = document.getElementById('panelRegister');
        const msgBox = document.getElementById('messageBox');

        const loginForm = document.getElementById('loginForm');
        const loginIdentifier = document.getElementById('loginIdentifier');
        const loginPassword = document.getElementById('loginPassword');
        const loginBtn = document.getElementById('loginBtn');
        const forgotBtn = document.getElementById('forgotBtn');

        const registerForm = document.getElementById('registerForm');
        const regUsername = document.getElementById('regUsername');
        const regEmail = document.getElementById('regEmail');
        const regEmailConfirm = document.getElementById('regEmailConfirm');
        const regPassword = document.getElementById('regPassword');
        const regBtn = document.getElementById('registerBtn');
        const avatarInput = document.getElementById('avatarInput');
        const avatarPreview = document.getElementById('avatarPreview');

        let selectedAvatarFile = null;

        // ================================================================
        //  POMOCNICZE
        // ================================================================
        function showMessage(text, type = 'error') {
            msgBox.textContent = text;
            msgBox.className = 'message ' + type;
        }

        function hideMessage() {
            msgBox.className = 'message';
            msgBox.textContent = '';
        }

        function setLoading(btn, loading) {
            if (loading) {
                btn.classList.add('loading');
                btn.innerHTML = '<span class="spinner"></span> Proszę czekać…';
            } else {
                btn.classList.remove('loading');
                btn.textContent = btn.dataset.original || 'Zaloguj się';
            }
        }

        // zapamiętaj oryginalny tekst
        loginBtn.dataset.original = 'Zaloguj się';
        regBtn.dataset.original = 'Załóż konto';

        // ================================================================
        //  PRZEŁĄCZANIE TABÓW
        // ================================================================
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const tab = btn.dataset.tab;
                panelLogin.classList.toggle('active', tab === 'login');
                panelRegister.classList.toggle('active', tab === 'register');
                hideMessage();
            });
        });

        // ================================================================
        //  PODGLĄD AVATARA
        // ================================================================
        avatarInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            selectedAvatarFile = file;
            const reader = new FileReader();
            reader.onload = (ev) => {
                avatarPreview.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        // ================================================================
        //  LOGOWANIE
        // ================================================================
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const identifier = loginIdentifier.value.trim();
            const password = loginPassword.value.trim();

            if (!identifier || !password) {
                showMessage('Wypełnij wszystkie pola.', 'error');
                return;
            }

            setLoading(loginBtn, true);

            try {
                let email = identifier;

                // jeśli to nie jest email (nie zawiera @), spróbuj znaleźć email po nazwie użytkownika
                if (!identifier.includes('@')) {
                    const { data, error } = await supabase
                        .from('profiles')
                        .select('email')
                        .eq('username', identifier)
                        .maybeSingle();

                    if (error || !data) {
                        showMessage('Nie znaleziono użytkownika o takiej nazwie.', 'error');
                        setLoading(loginBtn, false);
                        return;
                    }
                    email = data.email;
                }

                // logowanie przez Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (authError) {
                    showMessage('Nieprawidłowy e-mail lub hasło.', 'error');
                    setLoading(loginBtn, false);
                    return;
                }

                // sukces → przekierowanie
                window.location.href = 'index.html';

            } catch (err) {
                showMessage('Wystąpił błąd. Spróbuj ponownie.', 'error');
                console.error(err);
            } finally {
                setLoading(loginBtn, false);
            }
        });

        // ================================================================
        //  ZAPOMNIAŁEM HASŁA
        // ================================================================
        forgotBtn.addEventListener('click', async () => {
            const identifier = loginIdentifier.value.trim();
            if (!identifier) {
                showMessage('Wpisz swój e-mail lub nazwę użytkownika, aby zresetować hasło.', 'info');
                return;
            }

            let email = identifier;
            if (!identifier.includes('@')) {
                const { data, error } = await supabase
                    .from('profiles')
                    .select('email')
                    .eq('username', identifier)
                    .maybeSingle();
                if (error || !data) {
                    showMessage('Nie znaleziono użytkownika o takiej nazwie.', 'error');
                    return;
                }
                email = data.email;
            }

            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/login.html',
                });
                if (error) {
                    showMessage('Błąd: ' + error.message, 'error');
                } else {
                    showMessage('Link resetujący został wysłany na adres ' + email, 'success');
                }
            } catch (err) {
                showMessage('Wystąpił błąd. Spróbuj ponownie.', 'error');
                console.error(err);
            }
        });

        // ================================================================
        //  REJESTRACJA
        // ================================================================
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const username = regUsername.value.trim();
            const email = regEmail.value.trim();
            const emailConfirm = regEmailConfirm.value.trim();
            const password = regPassword.value.trim();

            if (!username || !email || !emailConfirm || !password) {
                showMessage('Wypełnij wszystkie pola.', 'error');
                return;
            }
            if (username.length < 3) {
                showMessage('Nazwa użytkownika musi mieć co najmniej 3 znaki.', 'error');
                return;
            }
            if (email !== emailConfirm) {
                showMessage('Adresy e-mail nie są identyczne.', 'error');
                return;
            }
            if (password.length < 6) {
                showMessage('Hasło musi mieć co najmniej 6 znaków.', 'error');
                return;
            }

            // sprawdź czy nazwa użytkownika jest już zajęta
            const { data: existingUser, error: checkError } = await supabase
                .from('profiles')
                .select('username')
                .eq('username', username)
                .maybeSingle();

            if (existingUser) {
                showMessage('Nazwa użytkownika jest już zajęta.', 'error');
                return;
            }

            setLoading(regBtn, true);

            try {
                // 1. Utwórz użytkownika w Auth
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: { username: username },
                    },
                });

                if (authError) {
                    showMessage('Błąd rejestracji: ' + authError.message, 'error');
                    setLoading(regBtn, false);
                    return;
                }

                const userId = authData.user?.id;
                if (!userId) {
                    showMessage('Nie udało się utworzyć konta. Spróbuj ponownie.', 'error');
                    setLoading(regBtn, false);
                    return;
                }

                // 2. Upload avatara (jeśli wybrany)
                let avatarUrl = null;
                if (selectedAvatarFile) {
                    const fileExt = selectedAvatarFile.name.split('.').pop();
                    const filePath = `avatars/${userId}.${fileExt}`;
                    const { error: uploadError } = await supabase.storage
                        .from('avatars')
                        .upload(filePath, selectedAvatarFile, { upsert: true });

                    if (!uploadError) {
                        const { data: urlData } = supabase.storage
                            .from('avatars')
                            .getPublicUrl(filePath);
                        avatarUrl = urlData.publicUrl;
                    } else {
                        console.warn('Upload avatara nieudany:', uploadError);
                    }
                }

                // 3. Utwórz profil w tabeli profiles
                const { error: profileError } = await supabase
                    .from('profiles')
                    .insert({
                        id: userId,
                        username: username,
                        email: email,
                        avatar_url: avatarUrl,
                    });

                if (profileError) {
                    // jeśli profil nie został utworzony, ale użytkownik istnieje w auth
                    showMessage('Konto utworzone, ale wystąpił błąd przy zapisie profilu. Spróbuj się zalogować.', 'info');
                    console.error(profileError);
                } else {
                    showMessage('✅ Konto utworzone pomyślnie! Za chwilę nastąpi przekierowanie…', 'success');
                }

                // 4. Przekieruj po krótkiej chwili
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);

            } catch (err) {
                showMessage('Wystąpił nieoczekiwany błąd.', 'error');
                console.error(err);
            } finally {
                setLoading(regBtn, false);
            }
        });

        // ================================================================
        //  SPRAWDŹ CZY UŻYTKOWNIK JEST JUŻ ZALOGOWANY
        // ================================================================
        (async function checkSession() {
            const { data } = await supabase.auth.getSession();
            if (data?.session) {
                // jeśli zalogowany → na index
                window.location.href = 'index.html';
            }
        })();

        // ================================================================
        //  OBSŁUGA BŁĘDÓW TOKENA (np. wygasły)
        // ================================================================
        supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_OUT' || event === 'USER_DELETED') {
                // nic nie robimy na login.html
            }
            if (event === 'SIGNED_IN' && session) {
                window.location.href = 'index.html';
            }
        });

        console.log('🔐 AuralPlayer – login.html załadowany');
    </script>

</body>
</html>
